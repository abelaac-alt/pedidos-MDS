<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0d0d0d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Finanzas">
<title>Finanzas</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f5f4f0; --surface:#fff; --ink:#0d0d0d; --ink-2:#555550; --ink-3:#999990;
  --line:#e8e7e2; --green:#1a6e3c; --green-bg:#edf7f1; --red:#b03a2e; --red-bg:#fdf0ed;
  --blue:#1a3a6e; --blue-bg:#edf2fb; --amber:#92620a; --amber-bg:#fdf6e3;
  --radius:10px; --mono:'DM Mono',monospace; --sans:'DM Sans',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:var(--sans);background:var(--bg);display:flex;justify-content:center;align-items:center;height:100vh;height:100dvh;overflow:hidden}

/* ── APP SHELL ── */
.app{width:100%;max-width:430px;height:100%;background:var(--surface);display:flex;flex-direction:column;position:relative;overflow:hidden;box-shadow:0 0 60px rgba(0,0,0,.1)}

/* ── HEADER ── */
.header{padding:14px 18px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--line);flex-shrink:0;background:var(--surface);z-index:20}
.header-title{font-family:var(--mono);font-size:11px;font-weight:500;letter-spacing:2px;text-transform:uppercase;color:var(--ink)}
.header-actions{display:flex;gap:4px}
.btn-icon{background:none;border:none;cursor:pointer;color:var(--ink-2);padding:6px;border-radius:6px;display:flex;align-items:center;transition:background .15s,color .15s}
.btn-icon:hover{background:var(--line);color:var(--ink)}

/* ── VIEWS ── */
.view-container{flex:1;position:relative;overflow:hidden}
.view{position:absolute;inset:0;display:none;flex-direction:column;padding:16px;padding-bottom:76px;opacity:0;transform:translateY(6px);transition:opacity .22s,transform .22s}
.view.active{display:flex;opacity:1;transform:translateY(0)}

/* ── DASHBOARD ── */
#view-dashboard{display:none;flex-direction:column;gap:12px;overflow-y:auto}
#view-dashboard.active{display:flex}
#view-dashboard::-webkit-scrollbar{width:2px}
#view-dashboard::-webkit-scrollbar-thumb{background:var(--line);border-radius:2px}
.balance-hero{background:var(--ink);color:#fff;border-radius:var(--radius);padding:22px 20px;position:relative;overflow:hidden;flex-shrink:0}
.balance-hero::before{content:'';position:absolute;right:-30px;top:-30px;width:130px;height:130px;border-radius:50%;background:rgba(255,255,255,.04)}
.balance-hero::after{content:'';position:absolute;right:20px;bottom:-40px;width:90px;height:90px;border-radius:50%;background:rgba(255,255,255,.03)}
.balance-label{font-family:var(--mono);font-size:9px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.5);margin-bottom:8px}
.balance-amount{font-family:var(--mono);font-size:32px;font-weight:500;letter-spacing:-1px;color:#fff;transition:filter .2s}
.balance-sub{font-size:11px;color:rgba(255,255,255,.4);margin-top:6px;font-family:var(--mono)}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;flex-shrink:0}
.stat-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:14px;position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:10px 10px 0 0}
.stat-card.income::before{background:var(--green)}
.stat-card.expense::before{background:var(--red)}
.stat-card.invest::before{background:var(--blue)}
.stat-card.count::before{background:var(--ink-3)}
.stat-label{font-family:var(--mono);font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink-3);margin-bottom:6px}
.stat-amount{font-family:var(--mono);font-size:17px;font-weight:500;letter-spacing:-.5px;transition:filter .2s}
.stat-card.income .stat-amount{color:var(--green)}
.stat-card.expense .stat-amount{color:var(--red)}
.stat-card.invest .stat-amount{color:var(--blue)}
.stat-card.count .stat-amount{color:var(--ink)}
.section-label{font-family:var(--mono);font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--ink-3);margin-bottom:8px;flex-shrink:0}
.recent-list{overflow-y:auto;flex:1}
.recent-list::-webkit-scrollbar{width:2px}

/* ── ACTIVITY SUB-TABS ── */
.sub-tabs{display:flex;gap:2px;background:var(--bg);border-radius:8px;padding:3px;margin-bottom:14px;flex-shrink:0}
.sub-tab{flex:1;padding:8px 4px;background:none;border:none;cursor:pointer;font-family:var(--mono);font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--ink-3);border-radius:6px;transition:all .15s}
.sub-tab.active{background:var(--surface);color:var(--ink);box-shadow:0 1px 4px rgba(0,0,0,.09)}
.sub-view{display:none;flex-direction:column;flex:1;overflow:hidden;min-height:0}
.sub-view.active{display:flex}

/* ── FILTERS ── */
.filter-bar{flex-shrink:0;display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.search-wrap{position:relative}
.search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--ink-3);pointer-events:none}
.search-wrap input{padding-left:34px}
input,select{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:7px;font-size:13px;font-family:var(--sans);background:var(--bg);color:var(--ink);transition:border-color .15s,background .15s}
input:focus,select:focus{outline:none;border-color:var(--ink);background:var(--surface)}
select{appearance:none;-webkit-appearance:none}
input[type="date"]{font-family:var(--sans)}
.filter-row{display:flex;gap:8px}
.filter-row>*{flex:1}
.btn-reset{width:100%;padding:8px;background:none;border:1px solid var(--line);border-radius:6px;font-size:10px;font-weight:600;font-family:var(--mono);letter-spacing:1px;text-transform:uppercase;cursor:pointer;color:var(--ink-3);transition:all .15s}
.btn-reset:hover{border-color:var(--ink-3);color:var(--ink)}

/* ── TX LIST ── */
.tx-list{list-style:none;overflow-y:auto;flex:1}
.tx-list::-webkit-scrollbar{width:2px}
.tx-list::-webkit-scrollbar-thumb{background:var(--line);border-radius:2px}
.tx-item{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid var(--line)}
.tx-left{display:flex;align-items:center;gap:10px;flex:1;min-width:0}
.tx-dot{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px;font-family:var(--mono)}
.tx-dot.ingreso{background:var(--green-bg);color:var(--green)}
.tx-dot.gasto{background:var(--red-bg);color:var(--red)}
.tx-dot.inversion{background:var(--blue-bg);color:var(--blue)}
.tx-info{min-width:0}
.tx-desc{font-size:13px;font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block;max-width:160px}
.tx-meta{font-family:var(--mono);font-size:9px;color:var(--ink-3);letter-spacing:.5px;margin-top:2px;display:flex;gap:5px;align-items:center}
.tx-right{display:flex;flex-direction:column;align-items:flex-end;gap:5px}
.tx-amount{font-family:var(--mono);font-size:13px;font-weight:500;transition:filter .2s}
.tx-amount.ingreso{color:var(--green)}
.tx-amount.gasto{color:var(--red)}
.tx-amount.inversion{color:var(--blue)}
.tx-actions{display:flex;gap:4px}
.btn-action{background:var(--bg);border:1px solid var(--line);font-size:9px;font-weight:600;font-family:var(--mono);cursor:pointer;padding:3px 7px;border-radius:4px;letter-spacing:.5px;text-transform:uppercase;color:var(--ink-2);transition:all .12s}
.btn-action:hover{background:var(--line)}
.btn-delete:hover{background:var(--red-bg);border-color:var(--red);color:var(--red)}
.empty-state{text-align:center;padding:40px 0;color:var(--ink-3);font-family:var(--mono);font-size:11px;letter-spacing:1px}

/* ══════════════════════════════════════
   STATISTICS
══════════════════════════════════════ */
.period-pills{display:flex;gap:5px;flex-shrink:0;margin-bottom:14px}
.pill{padding:6px 13px;border-radius:20px;border:1px solid var(--line);background:none;font-family:var(--mono);font-size:9px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;color:var(--ink-3);transition:all .15s}
.pill.active{background:var(--ink);color:#fff;border-color:var(--ink)}

.stats-scroll{overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:14px;padding-bottom:4px}
.stats-scroll::-webkit-scrollbar{width:2px}
.stats-scroll::-webkit-scrollbar-thumb{background:var(--line);border-radius:2px}

/* KPI grid */
.kpi-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.kpi-card{background:var(--bg);border-radius:9px;padding:12px 8px;text-align:center;position:relative;overflow:hidden}
.kpi-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px}
.kpi-card.k-income::after{background:var(--green)}
.kpi-card.k-expense::after{background:var(--red)}
.kpi-card.k-invest::after{background:var(--blue)}
.kpi-card.k-savings::after{background:var(--ink)}
.kpi-card.k-rate::after{background:var(--amber)}
.kpi-card.k-count::after{background:var(--ink-3)}
.kpi-val{font-family:var(--mono);font-size:13px;font-weight:500;display:block;margin-bottom:3px;transition:filter .2s;letter-spacing:-.3px}
.kpi-lbl{font-family:var(--mono);font-size:8px;letter-spacing:1px;text-transform:uppercase;color:var(--ink-3)}
.kpi-card.k-income .kpi-val{color:var(--green)}
.kpi-card.k-expense .kpi-val{color:var(--red)}
.kpi-card.k-invest .kpi-val{color:var(--blue)}
.kpi-card.k-savings .kpi-val{color:var(--ink)}
.kpi-card.k-rate .kpi-val{color:var(--amber)}
.kpi-card.k-count .kpi-val{color:var(--ink-3)}

/* Chart cards */
.chart-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:16px}
.chart-title{font-family:var(--mono);font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink-3);margin-bottom:14px;display:flex;justify-content:space-between;align-items:center}
.chart-badge{font-family:var(--mono);font-size:8px;letter-spacing:.5px;padding:2px 7px;border-radius:10px;background:var(--bg);color:var(--ink-3)}

/* Donut */
.donut-wrap{display:flex;align-items:center;gap:18px}
.donut-canvas{flex-shrink:0}
.donut-legend{display:flex;flex-direction:column;gap:10px;flex:1}
.legend-item{display:flex;align-items:center;gap:8px}
.legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.legend-info{flex:1}
.legend-label{font-family:var(--mono);font-size:9px;letter-spacing:.5px;color:var(--ink-2);display:block}
.legend-val{font-family:var(--mono);font-size:10px;font-weight:500;color:var(--ink);transition:filter .2s;display:block;margin-top:1px}
.legend-pct{font-family:var(--mono);font-size:11px;font-weight:500;color:var(--ink);min-width:36px;text-align:right}

/* Trend SVG */
.trend-wrap{position:relative;height:100px;margin-bottom:10px}
.trend-svg{width:100%;height:100%}
.trend-legend{display:flex;gap:14px;flex-wrap:wrap}
.trend-legend-item{display:flex;align-items:center;gap:5px}
.trend-legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.trend-legend-lbl{font-family:var(--mono);font-size:8px;letter-spacing:1px;text-transform:uppercase;color:var(--ink-3)}

/* Bar chart */
.bar-chart{display:flex;flex-direction:column;gap:11px}
.bar-row{display:flex;align-items:center;gap:10px}
.bar-row-label{font-family:var(--mono);font-size:9px;color:var(--ink-2);width:66px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-track{flex:1;height:7px;background:var(--bg);border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width .7s cubic-bezier(.4,0,.2,1)}
.bar-row-val{font-family:var(--mono);font-size:9px;color:var(--ink-2);width:62px;text-align:right;flex-shrink:0;transition:filter .2s}

/* Top list */
.top-list{display:flex;flex-direction:column;gap:10px}
.top-item{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--bg);border-radius:8px}
.top-rank{font-family:var(--mono);font-size:10px;color:var(--ink-3);width:14px;flex-shrink:0;text-align:center}
.top-dot{width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0}
.top-dot.ingreso{background:var(--green-bg);color:var(--green)}
.top-dot.gasto{background:var(--red-bg);color:var(--red)}
.top-dot.inversion{background:var(--blue-bg);color:var(--blue)}
.top-desc{flex:1;font-size:12px;font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.top-right{display:flex;flex-direction:column;align-items:flex-end;gap:1px;flex-shrink:0}
.top-amt{font-family:var(--mono);font-size:11px;font-weight:500;transition:filter .2s}
.top-date{font-family:var(--mono);font-size:8px;color:var(--ink-3)}

/* Savings meter */
.savings-meter{margin-top:2px}
.meter-track{height:10px;background:var(--bg);border-radius:6px;overflow:hidden;margin-bottom:8px;position:relative}
.meter-fill-income{position:absolute;top:0;left:0;height:100%;background:var(--green);opacity:.25;transition:width .7s}
.meter-fill-expense{position:absolute;top:0;left:0;height:100%;background:var(--red);transition:width .7s}
.meter-fill-invest{position:absolute;top:0;height:100%;background:var(--blue);transition:width .7s,left .7s}
.meter-labels{display:flex;justify-content:space-between}
.meter-lbl{font-family:var(--mono);font-size:8px;color:var(--ink-3);letter-spacing:.5px}

/* Heat calendar */
.heat-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.heat-day-lbl{font-family:var(--mono);font-size:7px;color:var(--ink-3);text-align:center;padding-bottom:2px}
.heat-cell{height:18px;border-radius:3px;background:var(--bg);cursor:default;transition:transform .1s}
.heat-cell:hover{transform:scale(1.2)}

/* Avg card */
.avg-pair{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.avg-box{background:var(--bg);border-radius:8px;padding:10px 12px}
.avg-val{font-family:var(--mono);font-size:15px;font-weight:500;display:block;margin-bottom:2px;transition:filter .2s}
.avg-lbl{font-family:var(--mono);font-size:8px;letter-spacing:1px;text-transform:uppercase;color:var(--ink-3)}

/* ── ADD FORM ── */
#view-add{overflow-y:auto}
#view-add::-webkit-scrollbar{width:2px}
.form-title{font-family:var(--mono);font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--ink-3);margin-bottom:18px}
.form-group{margin-bottom:14px}
label{display:block;font-family:var(--mono);font-size:9px;font-weight:500;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink-3);margin-bottom:6px}
.type-selector{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.type-btn{padding:10px 6px;border:1px solid var(--line);border-radius:7px;background:var(--bg);cursor:pointer;text-align:center;transition:all .15s;font-family:var(--mono);font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--ink-3)}
.type-btn .type-icon{font-size:16px;display:block;margin-bottom:4px}
.type-btn.selected.ingreso{background:var(--green-bg);border-color:var(--green);color:var(--green)}
.type-btn.selected.gasto{background:var(--red-bg);border-color:var(--red);color:var(--red)}
.type-btn.selected.inversion{background:var(--blue-bg);border-color:var(--blue);color:var(--blue)}
.btn-submit{width:100%;padding:14px;background:var(--ink);color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:600;font-family:var(--mono);letter-spacing:2px;text-transform:uppercase;cursor:pointer;margin-top:6px;transition:opacity .15s,transform .1s}
.btn-submit:active{transform:scale(.98);opacity:.9}
.btn-cancel{width:100%;padding:10px;background:none;color:var(--ink-3);border:none;font-size:11px;font-family:var(--mono);letter-spacing:1px;cursor:pointer;margin-top:4px;text-transform:uppercase}

/* ── TOAST ── */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:10px 18px;border-radius:20px;font-family:var(--mono);font-size:11px;letter-spacing:1px;opacity:0;transition:all .25s;pointer-events:none;z-index:999;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── BOTTOM NAV ── */
.bottom-nav{position:absolute;bottom:0;left:0;right:0;height:68px;background:var(--surface);border-top:1px solid var(--line);display:flex;justify-content:space-around;align-items:center;z-index:50}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:6px 20px;color:var(--ink-3);transition:color .15s;border-radius:10px}
.nav-item.active{color:var(--ink)}
.nav-item svg,.nav-label{pointer-events:none}
.nav-label{font-family:var(--mono);font-size:8px;letter-spacing:1.5px;text-transform:uppercase}
</style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <header class="header">
    <span class="header-title">Finanzas</span>
    <div class="header-actions">
      <button class="btn-icon" id="btn-incognito" title="Modo privado">
        <svg id="icon-show" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        <svg id="icon-hide" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
      </button>
      <button class="btn-icon" id="btn-export" title="Exportar Excel">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
      </button>
    </div>
  </header>

  <div class="view-container">

    <!-- ══ DASHBOARD ══ -->
    <div class="view" id="view-dashboard">
      <div class="balance-hero">
        <div class="balance-label">Ahorro disponible</div>
        <div class="balance-amount val-sensitive" id="val-savings">0,00 €</div>
        <div class="balance-sub" id="val-balance-sub">0 transacciones</div>
      </div>
      <div class="stats-grid">
        <div class="stat-card income"><div class="stat-label">Ingresos</div><div class="stat-amount val-sensitive" id="val-income">0,00 €</div></div>
        <div class="stat-card expense"><div class="stat-label">Gastos</div><div class="stat-amount val-sensitive" id="val-expense">0,00 €</div></div>
        <div class="stat-card invest"><div class="stat-label">Inversión</div><div class="stat-amount val-sensitive" id="val-invest">0,00 €</div></div>
        <div class="stat-card count"><div class="stat-label">Registros</div><div class="stat-amount" id="val-count">0</div></div>
      </div>
      <div class="section-label">Últimas transacciones</div>
      <ul class="recent-list tx-list" id="recent-list"></ul>
    </div>

    <!-- ══ ACTIVITY ══ -->
    <div class="view" id="view-activity">
      <div class="sub-tabs">
        <button class="sub-tab active" data-sub="lista">Lista</button>
        <button class="sub-tab" data-sub="stats">Estadísticas</button>
      </div>

      <!-- SUB: LISTA -->
      <div class="sub-view active" id="sub-lista">
        <div class="filter-bar">
          <div class="search-wrap">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="
