<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Cuentas y Ahorro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f4f7f9;
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --success: #10b981;
            --investment: #8b5cf6;
            --danger: #ef4444;
            --savings: #f59e0b;
            --border: #e5e7eb;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --transition: all 0.3s ease;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); display: flex; justify-content: center; padding: 2rem 1rem; min-height: 100vh; }
        .container { max-width: 900px; width: 100%; display: grid; gap: 2rem; }
        header { text-align: center; }
        header h1 { font-size: 2rem; font-weight: 700; color: var(--text-main); }

        /* Grid de 4 columnas para las cuentas obligatorias */
        .summary-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); 
            gap: 1rem; 
        }
        .card { background: var(--card-bg); padding: 1.5rem; border-radius: 1rem; box-shadow: var(--shadow); text-align: center; transition: var(--transition); }
        .card:hover { transform: translateY(-2px); }
        .card h3 { font-size: 0.875rem; color: var(--text-muted); text-transform: uppercase; margin-bottom: 0.5rem; letter-spacing: 0.05em; }
        .card .amount { font-size: 1.6rem; font-weight: 700; }
        
        .text-success { color: var(--success); }
        .text-investment { color: var(--investment); }
        .text-danger { color: var(--danger); }
        .text-savings { color: var(--savings); }

        .main-content { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; }
        @media (max-width: 768px) { .main-content { grid-template-columns: 1fr; } }
        
        .section-card { background: var(--card-bg); padding: 1.5rem; border-radius: 1rem; box-shadow: var(--shadow); }
        .section-card h2 { font-size: 1.25rem; margin-bottom: 1.5rem; border-bottom: 2px solid var(--border); padding-bottom: 0.5rem; }

        .form-group { margin-bottom: 1rem; }
        label { display: block; font-size: 0.875rem; font-weight: 500; margin-bottom: 0.5rem; }
        input, select { width: 100%; padding: 0.75rem; border: 1px solid var(--border); border-radius: 0.5rem; font-size: 1rem; background-color: #f9fafb; transition: var(--transition); }
        input:focus, select:focus { outline: none; border-color: var(--primary); background-color: #fff; }
        
        button { width: 100%; padding: 0.875rem; background-color: var(--primary); color: white; border: none; border-radius: 0.5rem; font-size: 1rem; font-weight: 600; cursor: pointer; margin-top: 0.5rem; transition: var(--transition); }
        button:hover { background-color: var(--primary-hover); }

        .transaction-list { list-style: none; max-height: 400px; overflow-y: auto; padding-right: 0.25rem; }
        .transaction-item { display: flex; justify-content: space-between; align-items: center; padding: 1rem; background: #f9fafb; border-radius: 0.5rem; margin-bottom: 0.75rem; border-left: 4px solid transparent; }
        
        /* Colores de borde según la cuenta */
        .transaction-item.ingreso { border-left-color: var(--success); }
        .transaction-item.inversion { border-left-color: var(--investment); }
        .transaction-item.gasto { border-left-color: var(--danger); }
        
        .transaction-desc { font-weight: 600; }
        .transaction-cat { font-size: 0.75rem; color: var(--text-muted); display: block; margin-top: 0.25rem; text-transform: capitalize; }
        
        .delete-btn { background: none; color: var(--text-muted); padding: 0 0.5rem; width: auto; font-size: 1.2rem; margin-top: 0; }
        .delete-btn:hover { color: var(--danger); background: none; }
        .empty-state { text-align: center; color: var(--text-muted); padding: 2rem 0; font-style: italic; }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Sistema de Gestión Financiera</h1>
        </header>

        <div class="summary-grid">
            <div class="card">
                <h3>Ingresos</h3>
                <div class="amount text-success" id="account-income">0,00 €</div>
            </div>
            <div class="card">
                <h3>Inversión</h3>
                <div class="amount text-investment" id="account-investment">0,00 €</div>
            </div>
            <div class="card">
                <h3>Gastos</h3>
                <div class="amount text-danger" id="account-expense">0,00 €</div>
            </div>
            <div class="card">
                <h3>Ahorro (Restante)</h3>
                <div class="amount text-savings" id="account-savings">0,00 €</div>
            </div>
        </div>

        <div class="main-content">
            <div class="section-card">
                <h2>Asignar a Cuenta</h2>
                <form id="finance-form">
                    <div class="form-group">
                        <label for="account-type">Cuenta</label>
                        <select id="account-type">
                            <option value="ingreso">Ingreso</option>
                            <option value="inversion">Inversión</option>
                            <option value="gasto">Gastos</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="category">Categoría</label>
                        <select id="category">
                            </select>
                    </div>

                    <div class="form-group">
                        <label for="description">Detalle / Concepto</label>
                        <input type="text" id="description" placeholder="Ej. Nómina mensual, Compra..." required>
                    </div>

                    <div class="form-group">
                        <label for="amount">Importe (€)</label>
                        <input type="number" id="amount" placeholder="0.00" step="0.01" min="0.01" required>
                    </div>

                    <button type="submit">Registrar en Cuenta</button>
                </form>
            </div>

            <div class="section-card">
                <h2>Historial de Movimientos</h2>
                <ul class="transaction-list" id="transaction-list"></ul>
            </div>
        </div>
    </div>

    <script>
        const accountIncome = document.getElementById('account-income');
        const accountInvestment = document.getElementById('account-investment');
        const accountExpense = document.getElementById('account-expense');
        const accountSavings = document.getElementById('account-savings');
        
        const listElement = document.getElementById('transaction-list');
        const formElement = document.getElementById('finance-form');
        const accountTypeSelect = document.getElementById('account-type');
        const categorySelect = document.getElementById('category');
        const descriptionInput = document.getElementById('description');
        const amountInput = document.getElementById('amount');

        // Organización estricta de categorías dentro de cada cuenta
        const accountMapping = {
            ingreso: ['sueldo', 'efectivo'],
            inversion: ['inversión'],
            gasto: ['gastos']
        };

        let dataRecords = JSON.parse(localStorage.getItem('finance_records')) || [];

        function init() {
            updateCategories();
            listElement.innerHTML = '';
            
            if(dataRecords.length === 0) {
                listElement.innerHTML = '<div class="empty-state">Sin movimientos en el mes actual.</div>';
            } else {
                dataRecords.forEach(renderRecord);
            }
            calculateAccounts();
        }

        // Cambia dinámicamente las categorías según la cuenta elegida
        function updateCategories() {
            const currentAccount = accountTypeSelect.value;
            categorySelect.innerHTML = '';
            
            accountMapping[currentAccount].forEach(cat => {
                const option = document.createElement('option');
                option.value = cat;
                option.textContent = cat.charAt(0).toUpperCase() + cat.slice(1);
                categorySelect.appendChild(option);
            });
        }

        function formatCurrency(value) {
            return new Intl.NumberFormat('es-ES', { style: 'currency', currency: 'EUR' }).format(value);
        }

        function renderRecord(record) {
            const li = document.createElement('li');
            li.classList.add('transaction-item', record.account);

            // Determinar prefijo visual según la cuenta
            let prefix = '-';
            let textClass = 'text-danger';
            if (record.account === 'ingreso') {
                prefix = '+';
                textClass = 'text-success';
            } else if (record.account === 'inversion') {
                prefix = '-';
                textClass = 'text-investment';
            }

            li.innerHTML = `
                <div>
                    <span class="text-main transaction-desc">${record.description}</span>
                    <span class="transaction-cat">Cuenta: ${record.account} | Cat: ${record.category}</span>
                </div>
                <div style="display: flex; align-items: center; gap: 1rem;">
                    <strong class="${textClass}">
                        ${prefix}${formatCurrency(record.amount)}
                    </strong>
                    <button class="delete-btn" onclick="deleteRecord(${record.id})">×</button>
                </div>
            `;
            listElement.appendChild(li);
        }

        // Realiza los cálculos de cada cuenta y deriva el remanente a Ahorro
        function calculateAccounts() {
            const totalIncome = dataRecords.filter(r => r.account === 'ingreso').reduce((acc, r) => acc + r.amount, 0);
            const totalInvestment = dataRecords.filter(r => r.account === 'inversion').reduce((acc, r) => acc + r.amount, 0);
            const totalExpense = dataRecords.filter(r => r.account === 'gasto').reduce((acc, r) => acc + r.amount, 0);
            
            // Fórmula de Ahorro: Lo que sobra al mes
            const totalSavings = totalIncome - totalInvestment - totalExpense;

            accountIncome.innerText = formatCurrency(totalIncome);
            accountInvestment.innerText = formatCurrency(totalInvestment);
            accountExpense.innerText = formatCurrency(totalExpense);
            accountSavings.innerText = formatCurrency(totalSavings);
            
            // Cambiar dinámicamente el color del ahorro si se entra en números negativos
            if (totalSavings < 0) {
                accountSavings.className = "amount text-danger";
            } else {
                accountSavings.className = "amount text-savings";
            }
        }

        function deleteRecord(id) {
            dataRecords = dataRecords.filter(r => r.id !== id);
            localStorage.setItem('finance_records', JSON.stringify(dataRecords));
            init();
        }

        // Listeners activos
        accountTypeSelect.addEventListener('change', updateCategories);

        formElement.addEventListener('submit', function(e) {
            e.preventDefault();

            const record = {
                id: Date.now() + Math.floor(Math.random() * 1000),
                account: accountTypeSelect.value,
                category: categorySelect.value,
                description: descriptionInput.value,
                amount: parseFloat(amountInput.value)
            };

            dataRecords.push(record);
            localStorage.setItem('finance_records', JSON.stringify(dataRecords));

            descriptionInput.value = '';
            amountInput.value = '';
            init();
        });

        // Ejecución inicial al cargar
        init();
    </script>
</body>
</html>
