<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gestión Financiera</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-body: #f0f0f0;
            --bg-app: #ffffff;
            --black: #000000;
            --white: #ffffff;
            --gray-dark: #333333;
            --gray-medium: #888888;
            --gray-light: #e5e5e5;
            --gray-hover: #f9f9f9;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background-color: var(--bg-body); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
        }

        .app-container { 
            width: 100%; 
            max-width: 420px; 
            height: 100vh; 
            max-height: 850px; 
            background: var(--bg-app); 
            position: relative; 
            display: flex; 
            flex-direction: column;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            border-left: 1px solid var(--gray-light);
            border-right: 1px solid var(--gray-light);
            overflow: hidden;
        }

        .app-header { 
            padding: 20px; 
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--gray-light);
            background: var(--bg-app);
            z-index: 10;
        }
        
        .app-header h1 { 
            font-size: 16px; 
            font-weight: 700; 
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .btn-export {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--black);
            padding: 4px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            transition: background-color 0.2s;
        }

        .btn-export:active {
            background-color: var(--gray-light);
        }

        .view-container {
            flex-grow: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding-bottom: 80px;
        }
        
        .view { display: none; padding: 20px; animation: fadeIn 0.2s ease; }
        .view.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* Dashboard */
        .summary-card { 
            padding: 24px 20px; 
            border: 1px solid var(--gray-light); 
            margin-bottom: 16px; 
            border-radius: 12px;
            background: var(--white);
        }
        .summary-card.dark {
            background: var(--black);
            color: var(--white);
            border-color: var(--black);
        }
        .summary-card h3 { 
            font-size: 11px; 
            color: var(--gray-medium); 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            margin-bottom: 8px;
        }
        .summary-card.dark h3 { color: var(--gray-light); }
        .summary-card .amount { 
            font-size: 32px; 
            font-weight: 700; 
            letter-spacing: -1px;
        }

        /* Formularios */
        .form-group { margin-bottom: 24px; }
        label { 
            display: block; 
            font-size: 12px; 
            font-weight: 600; 
            margin-bottom: 8px;
            color: var(--gray-dark);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        input, select { 
            width: 100%; 
            padding: 16px; 
            border: 1px solid var(--gray-light); 
            border-radius: 8px; 
            font-size: 16px; 
            background-color: var(--bg-app);
            color: var(--black);
        }
        select { appearance: none; -webkit-appearance: none; }
        input[type="date"] { font-family: 'Inter', sans-serif; }
        input:focus, select:focus { outline: none; border-color: var(--black); }
        
        .btn-submit { 
            width: 100%; 
            padding: 18px; 
            background-color: var(--black); 
            color: var(--white); 
            border: none; 
            border-radius: 8px; 
            font-size: 15px; 
            font-weight: 600; 
            cursor: pointer; 
            margin-top: 10px; 
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: background-color 0.2s;
        }
        .btn-submit:active { background-color: var(--gray-dark); }

        /* Lista de Transacciones */
        .transaction-list { list-style: none; }
        .transaction-item { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 20px 0; 
            border-bottom: 1px solid var(--gray-light); 
        }
        .transaction-info { flex-grow: 1; padding-right: 10px; }
        .transaction-desc { font-weight: 600; font-size: 16px; color: var(--black); display: block; margin-bottom: 4px; }
        
        .transaction-meta { 
            font-size: 12px; 
            color: var(--gray-medium); 
            display: flex; 
            gap: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .transaction-date { font-weight: 500; }
        
        .transaction-right { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; }
        .transaction-amount { font-weight: 700; font-size: 16px; text-align: right; }
        
        .amount-ingreso { color: var(--black); }
        .amount-gasto, .amount-inversion { color: var(--gray-medium); }

        .action-buttons { display: flex; gap: 8px; }
        .btn-action { 
            background: none; 
            border: none; 
            font-size: 11px; 
            font-weight: 600;
            cursor: pointer; 
            padding: 6px 10px;
            border-radius: 4px;
            background: var(--gray-hover);
            text-transform: uppercase;
        }
        .btn-edit { color: var(--black); border: 1px solid var(--gray-light); }
        .btn-delete { color: var(--gray-dark); }
        .btn-action:active { background: var(--gray-light); }
        
        .empty-state { text-align: center; color: var(--gray-medium); padding: 40px 0; font-size: 14px; }

        /* Navegación Inferior */
        .bottom-nav {
            position: absolute;
            bottom: 0;
            width: 100%;
            background: var(--bg-app);
            border-top: 1px solid var(--gray-light);
            display: flex;
            justify-content: space-around;
            padding: 12px 0 20px 0; 
            z-index: 100;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--gray-medium);
            cursor: pointer;
            width: 33%;
        }
        .nav-item.active { color: var(--black); }
        
        .nav-icon, .nav-text { pointer-events: none; }
        
        .nav-icon { width: 24px; height: 24px; margin-bottom: 4px; fill: currentColor; }
        .nav-text { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }

        ::-webkit-scrollbar { width: 0px; background: transparent; }
    </style>
</head>
<body>

    <div class="app-container">
        <header class="app-header">
            <h1>Finanzas</h1>
            
            <button class="btn-export" id="btn-export" title="Exportar a Excel">
                <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                    <path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/>
                </svg>
            </button>
        </header>

        <div class="view-container">
            
            <div class="view active" id="view-dashboard">
                <div class="summary-card dark">
                    <h3>Ahorro Disponible</h3>
                    <div class="amount" id="account-savings">0,00 €</div>
                </div>
                <div class="summary-card">
                    <h3>Ingresos Totales</h3>
                    <div class="amount" id="account-income">0,00 €</div>
                </div>
                <div class="summary-card">
                    <h3>Gastos Totales</h3>
                    <div class="amount" id="account-expense">0,00 €</div>
                </div>
                <div class="summary-card">
                    <h3>Capital Invertido</h3>
                    <div class="amount" id="account-investment">0,00 €</div>
                </div>
            </div>

            <div class="view" id="view-activity">
                <ul class="transaction-list" id="transaction-list">
                    </ul>
            </div>

            <div class="view" id="view-add">
                <form id="transaction-form">
                    <div class="form-group">
                        <label for="desc">Concepto</label>
                        <input type="text" id="desc" placeholder="Ej. Nómina, Alquiler..." required autocomplete="off">
                    </div>
                    <div class="form-group">
                        <label for="amount">Importe (€)</label>
                        <input type="number" id="amount" placeholder="0.00" step="0.01" min="0.01" required>
                    </div>
                    <div class="form-group">
                        <label for="date">Fecha</label>
                        <input type="date" id="date" required>
                    </div>
                    <div class="form-group">
                        <label for="type">Clasificación</label>
                        <select id="type" required>
                            <option value="ingreso">Ingreso</option>
                            <option value="gasto">Gasto</option>
                            <option value="inversion">Inversión</option>
                        </select>
                    </div>
                    <button type="submit" id="submit-btn" class="btn-submit">Publicar Registro</button>
                </form>
            </div>

        </div>

        <nav class="bottom-nav">
            <div class="nav-item active" data-tab="dashboard">
                <svg class="nav-icon" viewBox="0 0 24 24"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>
                <span class="nav-text">Resumen</span>
            </div>
            <div class="nav-item" data-tab="add">
                <svg class="nav-icon" viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
                <span class="nav-text">Añadir</span>
            </div>
            <div class="nav-item" data-tab="activity">
                <svg class="nav-icon" viewBox="0 0 24 24"><path d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zM7 7v2h14V7H7z"/></svg>
                <span class="nav-text">Actividad</span>
            </div>
        </nav>

    </div>

    <script>
        let transactions = [];
        let currentEditId = null;

        const form = document.getElementById('transaction-form');
        const list = document.getElementById('transaction-list');
        const submitBtn = document.getElementById('submit-btn');
        const dateInput = document.getElementById('date');

        // Formateador moneda para la interfaz (usando punto para miles y coma para decimales en ES)
        const formatter = new Intl.NumberFormat('es-ES', { style: 'currency', currency: 'EUR' });

        // Establecer fecha de hoy por defecto al cargar
        dateInput.value = new Date().toISOString().split('T')[0];

        // ----------------------------------------
        // SISTEMA DE NAVEGACIÓN ROBUSTO
        // ----------------------------------------
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', function() {
                const tabId = this.getAttribute('data-tab');
                switchTab(tabId, tabId === 'add');
            });
        });

        function switchTab(tabId, isManualClick = false) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));

            document.getElementById('view-' + tabId).classList.add('active');
            document.querySelector(`.nav-item[data-tab="${tabId}"]`).classList.add('active');

            if (tabId === 'add' && isManualClick) {
                resetForm();
            }
        }

        // ----------------------------------------
        // EXPORTACIÓN A EXCEL (CSV)
        // ----------------------------------------
        document.getElementById('btn-export').addEventListener('click', function() {
            if (transactions.length === 0) {
                alert("No hay actividad para exportar.");
                return;
            }

            // UTF-8 BOM para que Excel (en Windows) interprete bien los acentos
            let csvContent = "\uFEFF";
            
            // Cabeceras (Separador: punto y coma, ideal para Excel Europeo)
            csvContent += "Fecha;Concepto;Clasificación;Importe (€)\n";

            // Datos ordenados por fecha
            const sortedTransactions = [...transactions].sort((a, b) => new Date(b.date) - new Date(a.date));
            
            sortedTransactions.forEach(t => {
                const date = formatDateToDisplay(t.date);
                // Limpiamos los ; del concepto por si el usuario los escribió, para no romper columnas
                const desc = t.desc.replace(/;/g, ","); 
                // Adaptamos el número a formato europeo para Excel (cambiamos punto por coma en el decimal)
                const amount = t.amount.toFixed(2).replace(".", ",");
                
                csvContent += `${date};${desc};${t.type};${amount}\n`;
            });

            // Cálculos finales para añadir al documento
            const income = transactions.filter(t => t.type === 'ingreso').reduce((acc, t) => acc + t.amount, 0);
            const expense = transactions.filter(t => t.type === 'gasto').reduce((acc, t) => acc + t.amount, 0);
            const investment = transactions.filter(t => t.type === 'inversion').reduce((acc, t) => acc + t.amount, 0);
            const savings = income - expense - investment;

            // Filas de totales
            csvContent += "\n"; // Fila en blanco
            csvContent += `;;Total Ingresos;${income.toFixed(2).replace(".", ",")}\n`;
            csvContent += `;;Total Gastos;${expense.toFixed(2).replace(".", ",")}\n`;
            csvContent += `;;Total Inversiones;${investment.toFixed(2).replace(".", ",")}\n`;
            csvContent += `;;AHORRO DISPONIBLE;${savings.toFixed(2).replace(".", ",")}\n`;

            // Crear el archivo virtual y forzar la descarga
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            
            const link = document.createElement("a");
            link.setAttribute("href", url);
            link.setAttribute("download", `Mis_Finanzas_${new Date().toISOString().split('T')[0]}.csv`);
            link.style.visibility = 'hidden';
            
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        });

        // ----------------------------------------
        // LÓGICA FINANCIERA
        // ----------------------------------------
        function resetForm() {
            form.reset();
            currentEditId = null;
            submitBtn.innerText = "Publicar Registro";
            dateInput.value = new Date().toISOString().split('T')[0];
        }

        function formatDateToDisplay(dateString) {
            if (!dateString) return '';
            const [y, m, d] = dateString.split('-');
            return `${d}/${m}/${y}`;
        }

        function updateUI() {
            list.innerHTML = '';

            const sortedTransactions = [...transactions].sort((a, b) => new Date(b.date) - new Date(a.date));

            if (sortedTransactions.length === 0) {
                list.innerHTML = '<div class="empty-state">No hay actividad registrada.</div>';
            } else {
                sortedTransactions.forEach(t => {
                    const li = document.createElement('li');
                    li.className = 'transaction-item';
                    
                    const isPositive = t.type === 'ingreso';
                    const sign = isPositive ? '+' : '-';
                    const amountClass = isPositive ? 'amount-ingreso' : 'amount-gasto';
                    const displayDate = formatDateToDisplay(t.date);
                    
                    li.innerHTML = `
                        <div class="transaction-info">
                            <span class="transaction-desc">${t.desc}</span>
                            <div class="transaction-meta">
                                <span>${t.type}</span>
                                <span>&bull;</span>
                                <span class="transaction-date">${displayDate}</span>
                            </div>
                        </div>
                        <div class="transaction-right">
                            <div class="transaction-amount ${amountClass}">${sign}${formatter.format(t.amount)}</div>
                            <div class="action-buttons">
                                <button class="btn-action btn-edit" onclick="editTransaction(${t.id})">Editar</button>
                                <button class="btn-action btn-delete" onclick="deleteTransaction(${t.id})">Borrar</button>
                            </div>
                        </div>
                    `;
                    list.appendChild(li);
                });
            }

            const income = transactions.filter(t => t.type === 'ingreso').reduce((acc, t) => acc + t.amount, 0);
            const expense = transactions.filter(t => t.type === 'gasto').reduce((acc, t) => acc + t.amount, 0);
            const investment = transactions.filter(t => t.type === 'inversion').reduce((acc, t) => acc + t.amount, 0);
            const savings = income - expense - investment;

            document.getElementById('account-income').innerText = formatter.format(income);
            document.getElementById('account-expense').innerText = formatter.format(expense);
            document.getElementById('account-investment').innerText = formatter.format(investment);
            document.getElementById('account-savings').innerText = formatter.format(savings);
        }

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const desc = document.getElementById('desc').value;
            const amount = parseFloat(document.getElementById('amount').value);
            const date = document.getElementById('date').value;
            const type = document.getElementById('type').value;

            if (currentEditId) {
                const index = transactions.findIndex(t => t.id === currentEditId);
                if (index !== -1) {
                    transactions[index] = { ...transactions[index], desc, amount, date, type };
                }
            } else {
                const transaction = { id: Date.now(), desc, amount, date, type };
                transactions.unshift(transaction); 
            }
            
            updateUI();
            resetForm();
            switchTab('activity');
        });

        window.editTransaction = function(id) {
            const t = transactions.find(x => x.id === id);
            if (!t) return;

            currentEditId = id;
            document.getElementById('desc').value = t.desc;
            document.getElementById('amount').value = t.amount;
            document.getElementById('date').value = t.date;
            document.getElementById('type').value = t.type;
            
            submitBtn.innerText = "Actualizar Registro";
            switchTab('add');
        };

        window.deleteTransaction = function(id) {
            transactions = transactions.filter(t => t.id !== id);
            updateUI();
        };

        // Inicio
        updateUI();
    </script>
</body>
</html>
