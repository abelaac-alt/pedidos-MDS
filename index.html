<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Cuentas y Ahorro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f4f7f9;
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --success: #10b981;
            --investment: #8b5cf6;
            --danger: #ef4444;
            --savings: #f59e0b;
            --border: #e5e7eb;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --transition: all 0.3s ease;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); display: flex; justify-content: center; padding: 2rem 1rem; min-height: 100vh; }
        .container { max-width: 900px; width: 100%; display: grid; gap: 2rem; }
        header { text-align: center; }
        header h1 { font-size: 2rem; font-weight: 700; color: var(--text-main); }

        .summary-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); 
            gap: 1rem; 
        }
        .card { background: var(--card-bg); padding: 1.5rem; border-radius: 1rem; box-shadow: var(--shadow); text-align: center; transition: var(--transition); }
        .card:hover { transform: translateY(-2px); }
        .card h3 { font-size: 0.875rem; color: var(--text-muted); text-transform: uppercase; margin-bottom: 0.5rem; letter-spacing: 0.05em; }
        .card .amount { font-size: 1.6rem; font-weight: 700; }
        
        .text-success { color: var(--success); }
        .text-investment { color: var(--investment); }
        .text-danger { color: var(--danger); }
        .text-savings { color: var(--savings); }

        .main-content { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; }
        @media (max-width: 768px) { .main-content { grid-template-columns: 1fr; } }
        
        .section-card { background: var(--card-bg); padding: 1.5rem; border-radius: 1rem; box-shadow: var(--shadow); display: flex; flex-direction: column; }
        .section-card h2 { font-size: 1.25rem; margin-bottom: 1.5rem; border-bottom: 2px solid var(--border); padding-bottom: 0.5rem; display: flex; justify-content: space-between; align-items: center; }

        .form-group { margin-bottom: 1rem; }
        label { display: block; font-size: 0.875rem; font-weight: 500; margin-bottom: 0.5rem; }
        input, select { width: 100%; padding: 0.75rem; border: 1px solid var(--border); border-radius: 0.5rem; font-size: 1rem; background-color: #f9fafb; transition: var(--transition); }
        input:focus, select:focus { outline: none; border-color: var(--primary); background-color: #fff; }
        
        button { width: 100%; padding: 0.875rem; background-color: var(--primary); color: white; border: none; border-radius: 0.5rem; font-size: 1rem; font-weight: 600; cursor: pointer; margin-top: 0.5rem; transition: var(--transition); }
        button:hover { background-color: var(--primary-hover); }

        .transaction-list { list-style: none; max-height: 400px; overflow-y: auto; padding-right: 0.25rem; flex-grow: 1; }
        .transaction-item { display: flex; justify-content: space-between; align-items: center; padding: 1rem; background: #f9fafb; border-radius: 0.5rem; margin-bottom: 0.75rem; border-left: 4px solid transparent; }
        
        .transaction-item.ingreso { border-left-color: var(--success); }
        .transaction-item.inversion { border-left-color: var(--investment); }
        .transaction-item.gasto { border-left-color: var(--danger); }
        
        .transaction-desc { font-weight: 600; }
        .transaction-cat { font-size: 0.75rem; color: var(--text-muted); display: block; margin-top: 0.25rem; text-transform: capitalize; }
        
        .action-btns { display: flex; align-items: center; gap: 0.25rem; }
        .icon-btn { background: none; color: var(--text-muted); padding: 0 0.5rem; width: auto; font-size: 1.2rem; margin-top: 0; }
        .edit-btn:hover { color: var(--primary); background: none; }
        .delete-btn:hover { color: var(--danger); background: none; }
        .empty-state { text-align: center; color: var(--text-muted); padding: 2rem 0; font-style: italic; }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Sistema de Gestión Financiera</h1>
        </header>

        <div class="summary-grid">
            <div class="card">
                <h3>Ingresos</h3>
                <div class="amount text-success" id="account-income">0,00 €</div>
            </div>
            <div class="card">
                <h3>Inversión</h3>
                <div class="amount text-investment" id="account-investment">0,00 €</div>
            </div>
            <div class="card">
                <h3>Gastos</h3>
                <div class="amount text-danger" id="account-expense">0,00 €</div>
            </div>
            <div class="card">
                <h3>Ahorro (Restante)</h3>
                <div class="amount text-savings" id="account-savings">0,00 €</div>
            </div>
        </div>

        <div class="main-content">
            <div class="section-card">
                <h2>Asignar a Cuenta</h2>
                <form id="finance-form">
                    <div class="form-group">
                        <label for="date">Fecha</label>
                        <input type="date" id="date" required>
                    </div>

                    <div class="form-group">
                        <label for="account-type">Cuenta</label>
                        <select id="account-type">
                            <option value="ingreso">Ingreso</option>
                            <option value="inversion">Inversión</option>
                            <option value="gasto">Gastos</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="category">Categoría</label>
                        <input type="text" id="category" list="category-list" placeholder="Elige o escribe una categoría..." required>
                        <datalist id="category-list"></datalist>
                    </div>

                    <div class="form-group">
                        <label for="description">Detalle / Concepto</label>
                        <input type="text" id="description" placeholder="Ej. Nómina mensual, Compra..." required>
                    </div>

                    <div class="form-group">
                        <label for="amount">Importe (€)</label>
                        <input type="number" id="amount" placeholder="0.00" step="0.01" min="0.01" required>
                    </div>

                    <button type="submit" id="submit-btn">Registrar en Cuenta</button>
                    <button type="button" id="cancel-edit-btn" style="display: none; background-color: var(--text-muted);">Cancelar Edición</button>
                </form>
            </div>

            <div class="section-card">
                <h2>
                    Historial
                    <button type="button" id="export-excel" class="icon-btn" style="color: var(--success); font-size: 1rem;" title="Descargar en Excel">📥 Excel</button>
                </h2>
                <ul class="transaction-list" id="transaction-list"></ul>
            </div>
        </div>
    </div>

    <script>
        const accountIncome = document.getElementById('account-income');
        const accountInvestment = document.getElementById('account-investment');
        const accountExpense = document.getElementById('account-expense');
        const accountSavings = document.getElementById('account-savings');
        
        const listElement = document.getElementById('transaction-list');
        const formElement = document.getElementById('finance-form');
        const dateInput = document.getElementById('date');
        const accountTypeSelect = document.getElementById('account-type');
        
        // Elementos actualizados para las categorías
        const categoryInput = document.getElementById('category');
        const categoryList = document.getElementById('category-list');
        
        const descriptionInput = document.getElementById('description');
        const amountInput = document.getElementById('amount');
        const submitBtn = document.getElementById('submit-btn');
        const cancelEditBtn = document.getElementById('cancel-edit-btn');
        const exportExcelBtn = document.getElementById('export-excel');

        // Sugerencias de categorías ampliadas (ahora puedes añadir más o simplemente escribirlas al registrar)
        const accountMapping = {
            ingreso: ['Sueldo', 'Efectivo', 'Bizum', 'Transferencia'],
            inversion: ['Bolsa', 'Fondo de Inversión', 'Criptomonedas', 'Ahorro a plazo'],
            gasto: ['Comida', 'Transporte', 'Hogar', 'Salud', 'Ocio', 'Educación', 'Otros']
        };

        let dataRecords = JSON.parse(localStorage.getItem('finance_records')) || [];
        let editModeId = null;

        function init() {
            updateCategories();
            setDefaultDate();
            renderAllRecords();
            calculateAccounts();
        }

        function setDefaultDate() {
            const today = new Date().toISOString().split('T')[0];
            dateInput.value = today;
        }

        // Carga las sugerencias en el datalist
        function updateCategories() {
            const currentAccount = accountTypeSelect.value;
            categoryList.innerHTML = '';
            
            accountMapping[currentAccount].forEach(cat => {
                const option = document.createElement('option');
                option.value = cat;
                categoryList.appendChild(option);
            });

            // Solo limpiamos el input si no estamos en medio de una edición
            if (!editModeId) {
                categoryInput.value = '';
            }
        }

        function formatCurrency(value) {
            return new Intl.NumberFormat('es-ES', { style: 'currency', currency: 'EUR' }).format(value);
        }

        function renderAllRecords() {
            listElement.innerHTML = '';
            
            if(dataRecords.length === 0) {
                listElement.innerHTML = '<div class="empty-state">Sin movimientos registrados.</div>';
            } else {
                const sortedRecords = [...dataRecords].sort((a, b) => new Date(b.date) - new Date(a.date));
                sortedRecords.forEach(renderRecord);
            }
        }

        function renderRecord(record) {
            const li = document.createElement('li');
            li.classList.add('transaction-item', record.account);

            let prefix = '-';
            let textClass = 'text-danger';
            if (record.account === 'ingreso') {
                prefix = '+';
                textClass = 'text-success';
            } else if (record.account === 'inversion') {
                prefix = '-';
                textClass = 'text-investment';
            }

            const dateObj = new Date(record.date);
            const formattedDate = dateObj.toLocaleDateString('es-ES');

            li.innerHTML = `
                <div>
                    <span class="text-main transaction-desc">${record.description}</span>
                    <span class="transaction-cat">${formattedDate} | Cuenta: ${record.account} | Cat: ${record.category}</span>
                </div>
                <div style="display: flex; align-items: center; gap: 0.5rem;">
                    <strong class="${textClass}">
                        ${prefix}${formatCurrency(record.amount)}
                    </strong>
                    <div class="action-btns">
                        <button class="icon-btn edit-btn" onclick="editRecord(${record.id})" title="Editar">✎</button>
                        <button class="icon-btn delete-btn" onclick="deleteRecord(${record.id})" title="Eliminar">×</button>
                    </div>
                </div>
            `;
            listElement.appendChild(li);
        }

        function calculateAccounts() {
            const totalIncome = dataRecords.filter(r => r.account === 'ingreso').reduce((acc, r) => acc + r.amount, 0);
            const totalInvestment = dataRecords.filter(r => r.account === 'inversion').reduce((acc, r) => acc + r.amount, 0);
            const totalExpense = dataRecords.filter(r => r.account === 'gasto').reduce((acc, r) => acc + r.amount, 0);
            
            const totalSavings = totalIncome - totalInvestment - totalExpense;

            accountIncome.innerText = formatCurrency(totalIncome);
            accountInvestment.innerText = formatCurrency(totalInvestment);
            accountExpense.innerText = formatCurrency(totalExpense);
            accountSavings.innerText = formatCurrency(totalSavings);
            
            if (totalSavings < 0) {
                accountSavings.className = "amount text-danger";
            } else {
                accountSavings.className = "amount text-savings";
            }
        }

        function deleteRecord(id) {
            dataRecords = dataRecords.filter(r => r.id !== id);
            localStorage.setItem('finance_records', JSON.stringify(dataRecords));
            
            if(editModeId === id) {
                resetForm();
            }
            
            renderAllRecords();
            calculateAccounts();
        }

        function editRecord(id) {
            const record = dataRecords.find(r => r.id === id);
            if(!record) return;

            editModeId = id;
            dateInput.value = record.date;
            accountTypeSelect.value = record.account;
            
            // Actualizamos la lista de sugerencias y luego asignamos el valor que tenía guardado
            updateCategories();
            categoryInput.value = record.category; 
            
            descriptionInput.value = record.description;
            amountInput.value = record.amount;

            submitBtn.textContent = 'Actualizar Registro';
            cancelEditBtn.style.display = 'block';
            
            // Hacemos scroll suave hacia arriba para que el usuario vea el formulario
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function resetForm() {
            editModeId = null;
            descriptionInput.value = '';
            amountInput.value = '';
            categoryInput.value = '';
            setDefaultDate();
            submitBtn.textContent = 'Registrar en Cuenta';
            cancelEditBtn.style.display = 'none';
        }

        function exportToExcel() {
            if(dataRecords.length === 0) {
                alert("No hay registros para exportar.");
                return;
            }

            let csvContent = "data:text/csv;charset=utf-8,\uFEFF";
            csvContent += "Fecha;Cuenta;Categoria;Descripcion;Importe\n";

            dataRecords.forEach(record => {
                const dateObj = new Date(record.date).toLocaleDateString('es-ES');
                const safeDescription = record.description.replace(/;/g, ",");
                const safeAmount = record.amount.toString().replace('.', ',');
                
                const row = `${dateObj};${record.account};${record.category};${safeDescription};${safeAmount}`;
                csvContent += row + "\n";
            });

            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", `Transacciones_${new Date().toISOString().split('T')[0]}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // Listeners
        accountTypeSelect.addEventListener('change', updateCategories);
        cancelEditBtn.addEventListener('click', resetForm);
        exportExcelBtn.addEventListener('click', exportToExcel);

        formElement.addEventListener('submit', function(e) {
            e.preventDefault();

            if (editModeId) {
                dataRecords = dataRecords.map(r => {
                    if (r.id === editModeId) {
                        return {
                            ...r,
                            date: dateInput.value,
                            account: accountTypeSelect.value,
                            category: categoryInput.value.trim(), // Capturamos lo que el usuario haya escrito
                            description: descriptionInput.value,
                            amount: parseFloat(amountInput.value)
                        };
                    }
                    return r;
                });
            } else {
                const record = {
                    id: Date.now() + Math.floor(Math.random() * 1000),
                    date: dateInput.value,
                    account: accountTypeSelect.value,
                    category: categoryInput.value.trim(), // Capturamos lo que el usuario haya escrito
                    description: descriptionInput.value,
                    amount: parseFloat(amountInput.value)
                };
                dataRecords.push(record);
            }

            localStorage.setItem('finance_records', JSON.stringify(dataRecords));
            resetForm();
            renderAllRecords();
            calculateAccounts();
        });

        init();
    </script>
</body>
</html>
